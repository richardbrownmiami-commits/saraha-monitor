name: Deploy saraha-monitor
on:
  push:
    branches: [main]
    paths: ["src/**", "wrangler.toml", ".github/workflows/**"]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npx wrangler@3.90.0 deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ vars.CF_API_TOKEN }}
